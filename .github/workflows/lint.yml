name: Lint & Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint on all playbooks
        run: |
          mapfile -t PLAYBOOKS < <(grep -rl "hosts:\|tasks:" . --include="*.yml" | grep -v ".github" | grep -v "vars\." | grep -v "docker-compose")
          if [ "${#PLAYBOOKS[@]}" -eq 0 ]; then
            echo "No playbooks found."
            exit 0
          fi
          echo "Linting playbooks:"
          printf '%s\n' "${PLAYBOOKS[@]}"
          ansible-lint "${PLAYBOOKS[@]}" || exit 1

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan for hardcoded credentials
        run: |
          echo "Scanning for hardcoded passwords, tokens, and API keys..."
          FOUND=0
          PATTERNS=(
            'password\s*=\s*["\x27][^"\x27$\{][^"\x27]{2,}["\x27]'
            'passwd\s*=\s*["\x27][^"\x27$\{][^"\x27]{2,}["\x27]'
            'api[_-]?key\s*=\s*["\x27][^"\x27$\{]{8,}["\x27]'
            'secret\s*=\s*["\x27][^"\x27$\{]{8,}["\x27]'
            'token\s*=\s*["\x27][^"\x27$\{]{8,}["\x27]'
          )
          for pattern in "${PATTERNS[@]}"; do
            HITS=$(grep -rniE "$pattern" . \
              --include="*.ps1" --include="*.yml" --include="*.py" --include="*.sh" \
              --exclude-dir=".git" --exclude-dir=".github" \
              | grep -v "vault_" \
              | grep -v "#.*password" \
              | grep -v "no_log" \
              | grep -iv "example\|sample\|placeholder\|changeme\|yourpassword\|CHANGE_ME")
            if [ -n "$HITS" ]; then
              echo "Potential hardcoded secret found:"
              echo "$HITS"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Secrets scan failed. Remove hardcoded credentials."
            exit 1
          else
            echo "No hardcoded credentials found."
          fi

  header-check:
    name: Header Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Ansible playbooks for Author header
        run: |
          echo "Checking Ansible playbooks for Author header..."
          MISSING=""
          while IFS= read -r f; do
            if ! grep -qi "author" "$f"; then
              MISSING="$MISSING\n  $f"
            fi
          done < <(grep -rl "hosts:\|tasks:" . --include="*.yml" | grep -v ".github" | grep -v "vars\." | grep -v "docker-compose")
          if [ -n "$MISSING" ]; then
            echo -e "The following playbooks are missing an Author header:$MISSING"
            exit 1
          else
            echo "All Ansible playbooks have Author headers."
          fi
